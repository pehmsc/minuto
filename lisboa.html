<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MINUTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --surface:#151A24; --line:#252C3A;
    --text:#F2F4F8; --muted:#8C93A3;
    --accent:#FFC24B; --accent2:#3FD9B7; --danger:#FF5C6E;
    --btnInk:#1A1206;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
  .disp{font-family:'Bricolage Grotesque','Space Grotesk',sans-serif;font-weight:800}
  #wrap{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;-webkit-touch-callout:none}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 10px;transition:opacity .3s;z-index:4}
  #hud.off{opacity:0;pointer-events:none}
  #hud .tag{font-size:10.5px;letter-spacing:.26em;color:var(--muted);font-weight:700}
  #hud .right{display:flex;gap:15px;align-items:center}
  #score{font-size:15px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  #score.lit{color:var(--accent)}
  #clock{font-size:16px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  #barwrap{position:absolute;top:calc(env(safe-area-inset-top,0px) + 52px);left:18px;right:18px;height:4px;
    background:rgba(140,147,163,.25);border-radius:99px;overflow:hidden;transition:opacity .3s;z-index:4}
  #barwrap.off{opacity:0}
  #fill{height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width .12s linear}
  #ghost{position:absolute;top:0;width:2px;height:100%;background:rgba(242,244,248,.75);display:none}

  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:15px;padding:26px;text-align:center;z-index:10;overflow-y:auto}
  .hidden{display:none !important}
  .eyebrow{font-size:10.5px;letter-spacing:.3em;color:var(--muted);font-weight:700}
  h1{font-size:58px;letter-spacing:-.04em;line-height:.95}
  .cityname{font-size:12px;letter-spacing:.42em;font-weight:700;color:var(--accent)}
  .btn{border:0;border-radius:14px;padding:17px 34px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;min-width:250px;
    background:var(--accent);color:var(--btnInk)}
  .btn:active{transform:scale(.97)}
  .btn2{background:transparent;color:var(--text);border:1.5px solid var(--line);border-radius:14px;padding:14px 30px;
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:15px;min-width:250px}
  .mini{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:11px 18px;
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13px}
  .pill{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);border-radius:99px;padding:10px 15px;
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13px;color:var(--text);
    background:rgba(21,26,36,.72);border:1px solid var(--line);backdrop-filter:blur(6px)}
  #challBtn{left:14px}
  #avatarBtn{right:14px;display:flex;align-items:center;gap:7px}
  #avatarDot{width:13px;height:13px;border-radius:50%;background:var(--accent)}
  #home{justify-content:flex-end;padding-bottom:52px}
  #homeStats{font-size:12.5px;color:var(--muted);font-weight:500}
  #homeStats b{color:var(--text)}
  #wordTease{font-size:11.5px;color:var(--accent);font-weight:500;opacity:.9;max-width:300px;line-height:1.5}

  .charGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:400px}
  .charCard{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:9px}
  .charCard svg{width:100%;height:auto;display:block}
  .charCard .nm{font-size:12.5px;font-weight:700;margin-top:3px}
  .charCard .st{font-size:10px;color:var(--accent2);font-weight:700;letter-spacing:.06em}
  .charCard:active{transform:scale(.97)}

  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom,0px) + 24px);z-index:30;
    display:flex;flex-direction:column;gap:12px;align-items:center}
  .sheet h3{font-size:15px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800}
  .sheet .sub{font-size:12px;color:var(--muted);margin-top:-6px}
  .chall{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
  .chRow{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--bg);
    border:1px solid var(--line);border-radius:13px;padding:13px 15px;text-align:left}
  .chRow.here{border-color:var(--accent)}
  .chRow .l{display:flex;flex-direction:column;gap:2px}
  .chRow .n{font-size:14px;font-weight:700;color:var(--text)}
  .chRow .d{font-size:11px;color:var(--muted)}
  .chRow .r{font-size:12px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
  .dots{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .dots .d{width:36px;height:36px;border-radius:50%;border:3px solid transparent}
  .dots .d.sel{border-color:var(--text)}
  .dots .d.lock{opacity:.25}

  #count{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:8;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:112px;color:var(--accent)}
  #count.pop{animation:pop .62s ease-out}
  @keyframes pop{0%{transform:scale(1.7);opacity:0}22%{transform:scale(1);opacity:1}78%{opacity:1}100%{transform:scale(.92);opacity:0}}
  #hand{position:fixed;left:50%;bottom:20%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;
    gap:9px;pointer-events:none;z-index:8}
  #hand .fing{font-size:50px;animation:tapx 1.1s ease-in-out infinite}
  #hand span{font-size:13.5px;font-weight:500;color:var(--text);background:rgba(21,26,36,.85);border:1px solid var(--line);
    padding:8px 15px;border-radius:99px}
  @keyframes tapx{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(13px) scale(.9)}60%{transform:translateY(0) scale(1.05)}}

  .pct{font-size:86px;letter-spacing:-.05em;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
  #recordTag{font-size:12px;letter-spacing:.2em;font-weight:700;color:var(--accent2);height:15px}
  .blocks{font-size:21px;letter-spacing:3px}
  .subscore{font-size:16px;font-weight:700;color:var(--muted)}
  .subscore b{color:var(--accent)}
  .verdict{font-size:14.5px;color:var(--muted);max-width:290px;line-height:1.5}
  .statline{display:flex;gap:20px;justify-content:center;font-size:12px;color:var(--muted)}
  .statline b{display:block;font-size:17px;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
  #spark{width:min(300px,80vw);height:38px}

  #wordBox{z-index:40;background:rgba(11,14,20,.96)}
  #wordBox input{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;color:var(--text);
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;letter-spacing:.22em;text-align:center;
    padding:14px;width:min(320px,84vw);text-transform:uppercase}
  #wordBox .hint{font-size:13px;color:var(--muted);max-width:310px;line-height:1.55}
  #wordBox .hint b{color:var(--accent)}

  #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(140px);opacity:0;pointer-events:none;
    background:var(--surface);border:1px solid var(--line);color:var(--text);padding:12px 20px;border-radius:99px;
    font-size:13.5px;font-weight:500;max-width:86vw;transition:transform .25s,opacity .25s;z-index:50}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  #errbar{display:none;position:fixed;top:0;left:0;right:0;background:#FF5C6E;color:#fff;font-size:12px;font-weight:700;
    padding:10px 14px;z-index:99;word-break:break-all}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud" class="off">
    <span class="tag" id="hudTag">MINUTO</span>
    <span class="right"><span id="score">0⚡</span><span id="clock">60.0</span></span>
  </div>
  <div id="barwrap" class="off"><div id="fill"></div><div id="ghost"></div></div>
</div>

<div id="errbar"></div>

<div id="home" class="overlay">
  <button class="pill" id="challBtn">🌍 Desafios</button>
  <button class="pill" id="avatarBtn"><span id="avatarDot"></span> Avatar</button>
  <div class="cityname" id="homeCity">ORIGEM</div>
  <h1 class="disp">MIN<span style="color:var(--accent)">U</span>TO</h1>
  <div id="homeStats"></div>
  <button class="btn" id="dailyBtn">Desafio Diário</button>
  <button class="btn2" id="trainBtn">Treino</button>
  <div id="wordTease">✦ Há uma palavra secreta escondida no percurso</div>
</div>

<div id="select" class="overlay hidden">
  <div class="eyebrow" id="selEyebrow">DESAFIO DE HOJE</div>
  <h3 class="disp" id="selTitle" style="font-size:20px">Escolhe o teu personagem</h3>
  <div class="charGrid" id="charGrid"></div>
  <button class="mini" id="backBtn">Voltar</button>
</div>

<div id="result" class="overlay hidden" style="background:var(--bg)">
  <div class="eyebrow" id="resEyebrow">MINUTO</div>
  <div class="pct disp" id="pctLbl">0%</div>
  <div id="recordTag"></div>
  <div class="blocks" id="blocksLbl"></div>
  <div class="subscore" id="scoreLbl"></div>
  <canvas id="spark"></canvas>
  <div class="statline" id="statLine"></div>
  <div class="verdict" id="verdictLbl"></div>
  <button class="btn" id="retryBtn">Outra vez</button>
  <button class="mini" id="copyBtn">Copiar resultado</button>
  <button class="mini" id="homeBtn">Início</button>
</div>

<div id="wordBox" class="overlay hidden">
  <div class="eyebrow">PALAVRA SECRETA</div>
  <p class="hint" id="wordHint"></p>
  <input id="wordInput" maxlength="14" autocomplete="off" autocapitalize="characters" placeholder="?">
  <button class="btn" id="wordOk">Responder</button>
  <button class="mini" id="wordSkip">Tentar depois</button>
</div>

<div id="avatarSheet" class="sheet hidden">
  <h3 class="disp">O teu avatar</h3>
  <div class="dots" id="skinDots"></div>
  <button class="mini" id="avClose">Fechar</button>
</div>

<div id="challSheet" class="sheet hidden">
  <h3 class="disp">Escolhe o desafio</h3>
  <div class="sub">Cada cidade é um percurso e uma palavra diferente</div>
  <div class="chall" id="challList"></div>
  <button class="mini" id="chClose">Fechar</button>
</div>

<div id="count" class="disp"></div>
<div id="hand"><div class="fing">👆</div><span>Mantém premido para subir</span></div>
<div id="toast"></div>

<script>
(function(){
"use strict";
window.addEventListener('error',function(e){
  try{ var b=document.getElementById('errbar');
  b.textContent='ERRO: '+(e.message||'?')+' @ '+(e.lineno||'?'); b.style.display='block'; }catch(x){}
});

/* ============ CITY CONFIG ============ */
const CITY='lisboa';
const CITIES={
  original:{ file:'original.html', flag:'✦', name:'ORIGEM', desc:'O percurso original',
    word:'COMETA', wordHintTxt:'letras âmbar',
    css:{bg:'#0B0E14',surface:'#151A24',line:'#252C3A',text:'#F2F4F8',muted:'#8C93A3',
         accent:'#FFC24B',accent2:'#3FD9B7',danger:'#FF5C6E',btnInk:'#1A1206'},
    chars:['ball'], major:false },
  paris:{ file:'paris.html', flag:'🇫🇷', name:'PARIS', desc:'Noite dourada',
    word:'CROISSANT', wordHintTxt:'letras douradas',
    css:{bg:'#0B0E1C',surface:'#161B31',line:'#28304E',text:'#F2F4F8',muted:'#8A87A8',
         accent:'#F5C86E',accent2:'#3FD9B7',danger:'#FF5C6E',btnInk:'#1A1206'},
    chars:['ball','balao','croissant','pardal'], major:false },
  lisboa:{ file:'lisboa.html', flag:'🇵🇹', name:'LISBOA', desc:'Pôr do sol no Tejo',
    word:'SARDINHA', wordHintTxt:'letras claras',
    css:{bg:'#150C1E',surface:'#211430',line:'#3A2450',text:'#F8F2EC',muted:'#A08CA8',
         accent:'#FF8A3D',accent2:'#2ED6B0',danger:'#FF4E62',btnInk:'#2A1000'},
    chars:['ball','nata','sardinha','andorinha'], major:true }
};
const C=CITIES[CITY];
const ORDER=['original','paris','lisboa'];
(function theme(){
  const r=document.documentElement.style;
  for(const k in C.css) r.setProperty('--'+k, C.css[k]);
  document.title='MINUTO · '+C.name;
  document.getElementById('homeCity').textContent=C.name;
  document.getElementById('hudTag').textContent='MINUTO · '+C.name;
  document.getElementById('resEyebrow').textContent='MINUTO · '+C.name;
  document.getElementById('selEyebrow').textContent='DESAFIO DE HOJE · '+C.name;
})();

/* ============ seed / storage ============ */
const now=new Date();
const dateStr=String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0');
const dayKey=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
let seed=0; const sk=dayKey+'#'+CITY;
for(let i=0;i<sk.length;i++){ seed=(seed*31+sk.charCodeAt(i))>>>0; }
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
const firstRun=!lsGet('mn_played');

function stats(city){
  try{ const raw=lsGet('mn_stats_'+city); if(raw) return JSON.parse(raw); }catch(e){}
  return {n:0,best:0,sum:0,last:[],bs:0,perf:0};
}
function saveStats(city,s){ lsSet('mn_stats_'+city, JSON.stringify(s)); }

/* ============ audio ============ */
let AC=null;
function ensureAC(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); }
function snd(f,d,type,g){ if(!AC) return; try{
  const o=AC.createOscillator(),v=AC.createGain();
  o.type=type||'sine'; o.frequency.value=f; v.gain.value=(g||0.12);
  o.connect(v); v.connect(AC.destination);
  o.start(); v.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+(d||0.08));
  o.stop(AC.currentTime+(d||0.08)+0.02);
}catch(e){} }
const music={on:false,next:0,beat:0,iv:null,nb:null};
function noiseBuf(){ if(music.nb) return music.nb;
  const b=AC.createBuffer(1,Math.floor(AC.sampleRate*0.1),AC.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  music.nb=b; return b; }
function kick(at){ const o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(150,at); o.frequency.exponentialRampToValueAtTime(45,at+0.1);
  g.gain.setValueAtTime(0.21,at); g.gain.exponentialRampToValueAtTime(0.001,at+0.13);
  o.connect(g); g.connect(AC.destination); o.start(at); o.stop(at+0.14); }
function hat(at,vol){ const s=AC.createBufferSource(); s.buffer=noiseBuf();
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6500;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,at); g.gain.exponentialRampToValueAtTime(0.001,at+0.05);
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start(at); s.stop(at+0.06); }
function tone(at,f0,dur,type,vol){ const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=f0;
  g.gain.setValueAtTime(vol,at); g.gain.exponentialRampToValueAtTime(0.001,at+dur);
  o.connect(g); g.connect(AC.destination); o.start(at); o.stop(at+dur+0.02); }
const BASS_MIN=[110,110,130.81,164.81,110,110,98,130.81];
const ARP_MIN=[440,523.25,659.25,783.99];
const BASS_MAJ=[110,110,138.59,164.81,110,110,123.47,164.81];
const ARP_MAJ=[440,554.37,659.25,880];
function scheduleMusic(){
  if(!music.on||!AC) return;
  const B=C.major?BASS_MAJ:BASS_MIN, A=C.major?ARP_MAJ:ARP_MIN;
  const prog=Math.min(1,t/DUR), bpm=100+70*prog, step=(60/bpm)/2;
  while(music.next<AC.currentTime+0.18){
    const b=music.beat,at=music.next;
    if(b%4===0) kick(at);
    if(b%2===1) hat(at,prog>0.7?0.09:0.05);
    if(prog>0.7&&b%2===0&&b%4!==0) hat(at,0.04);
    tone(at,B[Math.floor(b/2)%8]*(prog>0.85?2:1),step*0.9,'square',0.05);
    if(prog>0.4&&b%2===0) tone(at,A[Math.floor(b/2)%4]*(prog>0.9?2:1),0.11,'triangle',0.05);
    music.next+=step; music.beat++;
  }
}
function startMusic(){ if(!AC) return; music.on=true; music.next=AC.currentTime+0.06; music.beat=0;
  if(music.iv) clearInterval(music.iv); music.iv=setInterval(scheduleMusic,60); }
function stopMusic(){ music.on=false; if(music.iv){clearInterval(music.iv); music.iv=null;} }
let riserOsc=null;
function startRiser(){ if(!AC) return; try{
  riserOsc=AC.createOscillator(); const g=AC.createGain(), f=AC.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=1800; riserOsc.type='sawtooth';
  const nt=AC.currentTime, left=Math.max(0.5,DUR-t);
  riserOsc.frequency.setValueAtTime(180,nt); riserOsc.frequency.linearRampToValueAtTime(950,nt+left);
  g.gain.setValueAtTime(0.03,nt); g.gain.linearRampToValueAtTime(0.07,nt+left);
  riserOsc.connect(f); f.connect(g); g.connect(AC.destination); riserOsc.start();
}catch(e){} }
function stopRiser(){ try{ if(riserOsc){riserOsc.stop();riserOsc.disconnect();} }catch(e){} riserOsc=null; }

/* ============ canvas ============ */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize',resize); resize();

/* ============ skins ============ */
const SKINS=[
  {id:0,c:'#FFC24B',free:true},{id:1,c:'#3FD9B7',free:true},{id:2,c:'#F76FA0',free:true},
  {id:3,c:'#C8F55A',free:true},{id:4,c:'#9F7FF5',free:true},
  {id:5,c:'#FFF3D0',free:false}   /* Cometa — unlocked by the original's secret word */
];
let skin=+(lsGet('mn_skin')||0); if(!(skin>=0&&skin<SKINS.length)) skin=0;
function skinUnlocked(i){ return SKINS[i].free || lsGet('mn_word_original')==='solved'; }
if(!skinUnlocked(skin)) skin=0;
document.getElementById('avatarDot').style.background=SKINS[skin].c;
let charSel='ball', selectMode='play', kind='daily';

/* ============ constants & tuning ============ */
const DUR=60;
const SPEED0=210, SPEED1=455, RISE=560, FALL=560, GRAV=1500, THRUST=3600, IMPULSE=140;
const WARM=2600, XEND=19950;
function speed(){ return SPEED0+(SPEED1-SPEED0)*(t/DUR); }
let mode='attract';
let running=true, t=0, dist=0, ball, hold=false, walls, orbs, letters, parts, shake=0, milestone=0, dead=false;
let score=0, shield=false, invuln=0, comboT=0, combo=0, wob=0, attractY=0, attractVy=0;
let orbTotal=0, orbsGot=0;
let bestPct=stats(CITY).best;

/* ============ generator ============ */
function makeLevel(){
  const rng=mulberry32(seed);
  walls=[]; let x=1000, prevC=H/2;
  const mTop=64;
  const acc=(SPEED1-SPEED0)/DUR;
  while(x<22000){
    const lin=Math.max(0,Math.min(1,(x-WARM)/(XEND-WARM)));
    const prog=Math.pow(lin,1.4);
    const gap=265-127*prog;
    const spacing=400-100*prog+rng()*50;
    const v=Math.sqrt(SPEED0*SPEED0+2*acc*x);
    const dtB=spacing/v;
    const maxD=0.92*RISE*dtB;
    const lo=Math.max(mTop+gap/2, prevC-maxD);
    const hi=Math.min(H-mTop-gap/2, prevC+maxD);
    const c=lo+rng()*Math.max(1,hi-lo);
    walls.push({x:x,top:c-gap/2,bot:c+gap/2,w:54});
    prevC=c; x+=spacing;
  }
  orbs=[];
  for(let i=0;i<walls.length;i++){
    const w=walls[i];
    const pr=Math.max(0,Math.min(1,(w.x-WARM)/(XEND-WARM)));
    const shRate=0.18-0.11*pr;
    if(rng()<0.5) orbs.push({x:w.x+w.w/2,y:(w.top+w.bot)/2,r:9,taken:false,sh:rng()<shRate});
    if(i<walls.length-1&&rng()<0.45){
      const nx=(w.x+walls[i+1].x)/2,m=90;
      orbs.push({x:nx,y:m+rng()*(H-2*m),r:9,taken:false,sh:rng()<shRate});
    }
  }
  orbTotal=orbs.length;
  letters=[];
  const step=(XEND-1600)/C.word.length;
  for(let i=0;i<C.word.length;i++){
    letters.push({ch:C.word[i], x:1600+i*step, y:H*(0.22+0.18*(i%4))});
  }
}

function trailCol(){
  const c=charSel;
  if(c==='ball') return SKINS[skin].c;
  if(c==='balao') return '#F5C86E';
  if(c==='croissant') return '#E0A458';
  if(c==='pardal') return '#C8B49A';
  if(c==='nata') return '#D8A050';
  if(c==='sardinha') return '#D2EBFA';
  if(c==='andorinha') return '#FFFFFF';
  return C.css.accent;
}
function hex2rgba(h,a){
  const n=parseInt(h.slice(1),16);
  return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
}
function emitTrail(x,y){
  const c=charSel, col=trailCol();
  if(c==='sardinha'){
    if(Math.random()<0.45) parts.push({x:x-10,y:y+(Math.random()-0.5)*8,vx:-speed()*0.35,vy:-(15+Math.random()*35),life:0.55,col:col,g:0});
  } else if(c==='croissant'||c==='nata'){
    if(Math.random()<0.45) parts.push({x:x-8,y:y+3,vx:-speed()*0.4,vy:20+Math.random()*40,life:0.5,col:col,g:1});
  } else {
    if(Math.random()<0.6) parts.push({x:x,y:y,vx:-speed()*0.5,vy:(Math.random()-0.5)*40,life:0.35,col:col,g:0});
    if(c==='balao'&&hold&&Math.random()<0.5) parts.push({x:x,y:y+12,vx:-speed()*0.3,vy:20+Math.random()*30,life:0.3,col:'#E2702F',g:0});
  }
}

/* ============ loop ============ */
let last=0, attractD=0;
function loop(ts){
  if(!running) return;
  if(!last) last=ts;
  const dt=Math.min((ts-last)/1000,0.033); last=ts;

  if(mode==='attract'){
    attractD+=190*dt;
    SCENE(attractD);
    for(const w of walls){
      const wx=w.x-attractD%18000;
      if(wx>W+80||wx+w.w<-80) continue;
      OBS(wx,H*0.03,w.w,w.top-H*0.03); OBS(wx,w.bot,w.w,H*0.9-w.bot);
      ctx.fillStyle=EDGE; ctx.fillRect(wx,w.top-3,w.w,3); ctx.fillRect(wx,w.bot,w.w,3);
    }
    if(attractY===0) attractY=H/2;
    let near=null,nd=1e9;
    for(const w of walls){ const wx=w.x-attractD%18000;
      if(wx-W*0.24>-60 && wx-W*0.24<nd){ nd=wx-W*0.24; near=(w.top+w.bot)/2; } }
    const tgt=near!==null?near:H/2;
    attractVy += (tgt-attractY)*60*dt - attractVy*32*dt;
    attractVy=Math.max(-420,Math.min(420,attractVy));
    attractY += attractVy*dt;
    if(Math.random()<0.6) parts.push({x:W*0.24,y:attractY,vx:-140,vy:(Math.random()-0.5)*30,life:0.35,col:SKINS[skin].c,g:0});
    stepParts(dt); drawParts();
    const col=SKINS[skin].c;
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(W*0.24,attractY,13,0,7); ctx.fill(); ctx.shadowBlur=0;
    requestAnimationFrame(loop); return;
  }

  if(mode!=='play'){
    wob+=dt; ball.y=H/2+Math.sin(wob*2.4)*12;
    emitTrail(96,ball.y);
  } else if(!dead){
    t+=dt;
    if(t>=DUR-8&&!riserOsc) startRiser();
    ball.vy += (hold?GRAV-THRUST:GRAV)*dt;
    ball.vy = Math.max(-RISE,Math.min(FALL,ball.vy));
    ball.y += ball.vy*dt;
    dist += speed()*dt;
    if(invuln>0) invuln-=dt;
    if(comboT>0){ comboT-=dt; if(comboT<=0) combo=0; }
    emitTrail(96,ball.y);
    const pm=Math.floor(t/DUR*10);
    if(pm>milestone){ milestone=pm; snd(420+pm*60,0.09,'triangle',0.1); }
    const bx=96;
    for(const o of orbs){
      if(o.taken) continue;
      const ox=o.x-dist;
      if(ox>W+40) break;
      if(ox<bx-60) continue;
      const dx=ox-bx,dy=o.y-ball.y;
      if(dx*dx+dy*dy<(o.r+ball.r+5)*(o.r+ball.r+5)){
        o.taken=true; orbsGot++;
        if(o.sh){
          if(!shield){ shield=true; snd(520,0.12,'triangle',0.13); setTimeout(function(){snd(780,0.14,'triangle',0.13);},70); }
          else { score+=25; snd(700,0.1,'triangle',0.12); }
          boom(ox,o.y,C.css.accent2,16);
        } else {
          combo++; comboT=2; score+=10+(combo>=5?5:0);
          snd(500+Math.min(6,combo)*80,0.07,'triangle',0.12);
          boom(ox,o.y,C.css.accent,12);
        }
        updateScore();
      }
    }
    if(ball.y-ball.r<0||ball.y+ball.r>H) hit(bx,Math.max(ball.r,Math.min(H-ball.r,ball.y)),true);
    if(!dead) for(const w of walls){
      const wx=w.x-dist;
      if(wx>bx+ball.r+w.w) break;
      if(wx+w.w<bx-ball.r) continue;
      if(ball.y-ball.r<w.top||ball.y+ball.r>w.bot){
        if(bx+ball.r>wx&&bx-ball.r<wx+w.w){ hit(bx,ball.y,false); break; }
      }
    }
    if(!dead&&t>=DUR){ finish(1); return; }
  }
  stepParts(dt);
  shake=Math.max(0,shake-dt*30);
  drawGame();
  requestAnimationFrame(loop);
}
function stepParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.g) p.vy+=500*dt;
    if(p.life<=0) parts.splice(i,1);
  }
}
function drawParts(){
  for(const p of parts){
    ctx.fillStyle=hex2rgba(p.col,Math.max(0,Math.min(1,p.life*1.6)));
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill();
  }
}
function drawGame(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  SCENE(dist);
  for(const w of walls){
    const wx=w.x-dist;
    if(wx>W+80) break;
    if(wx+w.w<-80) continue;
    OBS(wx,-6,w.w,w.top+6); OBS(wx,w.bot,w.w,H-w.bot+6);
    ctx.fillStyle=EDGE;
    ctx.fillRect(wx,w.top-3,w.w,3); ctx.fillRect(wx,w.bot,w.w,3);
  }
  const pulse=1+Math.sin(t*7)*0.12;
  for(const o of orbs){
    if(o.taken) continue;
    const ox=o.x-dist;
    if(ox>W+40) break;
    if(ox<-40) continue;
    if(o.sh){
      ctx.strokeStyle=C.css.accent2; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(ox,o.y,(o.r+5)*pulse,0,7); ctx.stroke();
      ctx.fillStyle=C.css.accent2;
      ctx.beginPath(); ctx.arc(ox,o.y,o.r*0.8*pulse,0,7); ctx.fill();
    } else {
      ctx.fillStyle=C.css.accent;
      ctx.beginPath(); ctx.arc(ox,o.y,o.r*0.78*pulse,0,7); ctx.fill();
      ctx.strokeStyle='rgba(11,14,20,0.55)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ox,o.y,o.r*0.78*pulse,0,7); ctx.stroke();
    }
  }
  ctx.font='800 44px "Bricolage Grotesque",sans-serif'; ctx.textAlign='center';
  for(const L of letters){
    const lx=L.x-dist;
    if(lx>W+60) break;
    if(lx<-60) continue;
    const by=L.y+Math.sin((Date.now()/300)+L.x)*6;
    ctx.fillStyle='rgba(11,14,20,0.45)';
    ctx.beginPath(); ctx.arc(lx,by-14,29,0,7); ctx.fill();
    ctx.strokeStyle='rgba(11,14,20,0.8)'; ctx.lineWidth=5;
    ctx.strokeText(L.ch,lx,by);
    ctx.fillStyle=C.css.accent;
    ctx.fillText(L.ch,lx,by);
  }
  drawParts();
  if(!dead) drawChar(96,ball.y,hold&&mode==='play');
  ctx.restore();
  document.getElementById('clock').textContent=Math.max(0,DUR-t).toFixed(1);
  document.getElementById('fill').style.width=Math.min(100,t/DUR*100)+'%';
}

/* ============ hit / finish ============ */
function hit(x,y,edge){
  if(invuln>0){ if(edge){ ball.y=Math.max(ball.r+2,Math.min(H-ball.r-2,ball.y)); ball.vy*=-0.3; } return; }
  if(shield){
    shield=false; invuln=1.2; shake=8;
    if(edge){ ball.y=Math.max(ball.r+2,Math.min(H-ball.r-2,ball.y)); ball.vy*=-0.3; }
    boom(x,y,C.css.accent2,22);
    snd(300,0.15,'sawtooth',0.12); setTimeout(function(){snd(450,0.1,'triangle',0.1);},80);
    return;
  }
  dead=true; shake=14; stopMusic(); stopRiser();
  boom(x,y,C.css.danger,34);
  snd(150,0.25,'sawtooth',0.16); setTimeout(function(){snd(95,0.3,'sawtooth',0.12);},90);
  setTimeout(function(){ finish(t/DUR); },750);
}
function drawSpark(list,best){
  const c=document.getElementById('spark');
  const w=c.clientWidth||300, h=38;
  c.width=w*DPR; c.height=h*DPR;
  const g=c.getContext('2d'); g.setTransform(DPR,0,0,DPR,0,0);
  g.clearRect(0,0,w,h);
  const n=list.length; if(!n) return;
  const bw=Math.min(20,(w-(n-1)*4)/n);
  const step=n>1?(w-bw)/(n-1):0;
  for(let i=0;i<n;i++){
    const v=list[i]/100, bh=Math.max(2,v*h);
    g.fillStyle = list[i]>=best ? C.css.accent : 'rgba(140,147,163,0.4)';
    g.fillRect(i*step,h-bh,bw,bh);
  }
}
function finish(frac){
  running=false; stopMusic(); stopRiser();
  lsSet('mn_played','1');
  const pct=Math.min(100,Math.round(frac*100));
  const s=stats(CITY);
  const isRecord = pct>s.best;
  const perfect = pct>=100 && orbsGot>=orbTotal && orbTotal>0;
  s.n++; s.sum+=pct; s.best=Math.max(s.best,pct);
  s.bs=Math.max(s.bs||0,score); if(perfect) s.perf=(s.perf||0)+1;
  s.last.push(pct); if(s.last.length>10) s.last.shift();
  saveStats(CITY,s); bestPct=s.best;

  hudOff(true);
  document.getElementById('result').classList.remove('hidden');
  const lbl=document.getElementById('pctLbl'); let cur=0;
  const iv=setInterval(function(){
    cur=Math.min(pct,cur+3); lbl.textContent=cur+'%';
    if(cur>=pct){ clearInterval(iv); if(pct===100) snd(880,0.4,'triangle',0.14); }
  },18);
  document.getElementById('recordTag').textContent = perfect ? '★ PERFEITO' : (isRecord && s.n>1 ? '🔥 NOVO RECORDE' : '');
  if(isRecord && s.n>1){ setTimeout(function(){ snd(700,0.1,'triangle',0.13); },400);
    setTimeout(function(){ snd(950,0.14,'triangle',0.13); },500); }
  const filled=Math.round(pct/10);
  document.getElementById('blocksLbl').textContent='▓'.repeat(filled)+'░'.repeat(10-filled);
  document.getElementById('scoreLbl').innerHTML='<b>'+score+'⚡</b> · '+orbsGot+'/'+orbTotal+' orbes';
  const avg=Math.round(s.sum/s.n);
  document.getElementById('statLine').innerHTML=
    '<div><b>'+s.best+'%</b>recorde</div><div><b>'+avg+'%</b>média</div><div><b>'+s.n+'</b>tentativas</div>'
    +'<div><b>'+(s.bs||0)+'⚡</b>máx</div>';
  drawSpark(s.last,s.best);
  const v=perfect?'Minuto completo E todos os orbes. Nada mais a provar hoje.':
    pct>=100?('MINUTO COMPLETO. Faltaram '+(orbTotal-orbsGot)+' orbes — consegues o PERFEITO?'):
    pct>=85?'Quase. QUASE. Da próxima cai.':pct>=60?'Tão perto que dói.':
    pct>=30?'A meio caminho do minuto.':'O minuto ganhou. Para já.';
  document.getElementById('verdictLbl').textContent=v;
  window.__share='MINUTO '+C.flag+' '+C.name+' · '+dateStr+'\n'+pct+'% '+'▓'.repeat(filled)+'░'.repeat(10-filled)+' · '+score+'⚡'
    +(s.best>pct?'\nRecorde: '+s.best+'%':'')
    +(perfect?'\n★ PERFEITO':'')
    +'\nConsegues melhor? https://pehmsc.github.io/minuto/'+C.file;

  const st=lsGet('mn_word_'+CITY);
  if(st!=='solved'){
    const need = st==='failed' ? 100 : 80;
    if(pct>=need) setTimeout(openWord,1000);
  }
}

/* ============ flow ============ */
function hudOff(off){
  document.getElementById('hud').classList.toggle('off',off);
  document.getElementById('barwrap').classList.toggle('off',off);
}
function homeStats(){
  const s=stats(CITY);
  document.getElementById('homeStats').innerHTML = s.n
    ? 'Recorde <b>'+s.best+'%</b> · '+s.n+' tentativa'+(s.n>1?'s':'')
    : 'Primeira vez por aqui';
  const g=document.getElementById('ghost');
  if(s.best>0){ g.style.display='block'; g.style.left=s.best+'%'; } else g.style.display='none';
}
function goHome(){
  mode='attract'; running=true; last=0; dead=false; t=0; parts=[]; attractY=0;
  makeLevel(); hudOff(true); homeStats();
  document.getElementById('result').classList.add('hidden');
  document.getElementById('select').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  requestAnimationFrame(loop);
}
function startGame(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('select').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  resize(); reset(); hudOff(false); homeStats();
  mode='waiting'; wob=0; running=true; last=0;
  if(firstRun && !lsGet('mn_tut')){ document.getElementById('hand').style.display='flex'; }
  else{ document.getElementById('hand').style.display='none';
    setTimeout(function(){ if(mode==='waiting') beginCountdown(); },430); }
  requestAnimationFrame(loop);
}
function showCount(txt){
  const c=document.getElementById('count');
  c.style.display='flex'; c.textContent=txt;
  c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');
}
function beginCountdown(){
  mode='count';
  document.getElementById('hand').style.display='none';
  lsSet('mn_tut','1');
  const S=750;
  showCount('3'); snd(440,0.12,'square',0.12);
  setTimeout(function(){ showCount('2'); snd(440,0.12,'square',0.12); },S);
  setTimeout(function(){ showCount('1'); snd(440,0.12,'square',0.12); },S*2);
  setTimeout(function(){
    showCount('GO!'); snd(880,0.35,'square',0.15);
    mode='play'; t=0; last=0;
    if(hold) ball.vy=Math.max(-RISE,ball.vy-IMPULSE);
    startMusic();
    setTimeout(function(){ document.getElementById('count').style.display='none'; },640);
  },S*3);
}

};
function renderChars(){
  const g=document.getElementById('charGrid'); let h='';
  for(const id of C.chars){
    const cd=CARDS[id];
    h+='<div class="charCard" data-id="'+id+'">'+cd.svg()+'<div class="nm">'+cd.nm+'</div>'
      +'<div class="st">'+(id==='ball'?'GRÁTIS':'GRÁTIS HOJE')+'</div></div>';
  }
  g.innerHTML=h;
  Array.prototype.forEach.call(g.children,function(card){
    card.addEventListener('click',function(){
      ensureAC(); snd(560,0.08,'triangle');
      if(selectMode==='reward'){
        lsSet('mn_week_char',card.dataset.id);
        toast('🏆 Avatar da semana escolhido (simulado)');
        goHome(); return;
      }
      charSel=card.dataset.id; startGame();
    });
  });
}

/* ============ input ============ */
let usingTouch=false;
function overlaysHidden(){
  const ids=['home','select','result','wordBox','avatarSheet','challSheet'];
  for(const i of ids) if(!document.getElementById(i).classList.contains('hidden')) return false;
  return true;
}
function gameActive(){ return mode==='waiting'||mode==='count'||mode==='play'; }
function tapAction(){
  if(mode==='waiting'){ hold=true; beginCountdown(); return; }
  if(mode==='count'||mode==='play'){
    hold=true;
    if(mode==='play'&&!dead){ ball.vy=Math.max(-RISE,ball.vy-IMPULSE); snd(340,0.05,'sine',0.06); }
  }
}
document.addEventListener('touchstart',function(e){
  usingTouch=true;
  if(gameActive()&&overlaysHidden()){ e.preventDefault(); ensureAC(); tapAction(); }
},{passive:false});
document.addEventListener('touchend',function(e){
  if(gameActive()&&overlaysHidden()&&mode==='play'&&!dead) e.preventDefault();
  hold=false;
},{passive:false});
document.addEventListener('touchcancel',function(){ hold=false; });
document.addEventListener('touchmove',function(e){ if(gameActive()&&overlaysHidden()) e.preventDefault(); },{passive:false});
document.addEventListener('mousedown',function(){ if(usingTouch) return; if(gameActive()&&overlaysHidden()){ ensureAC(); tapAction(); } });
document.addEventListener('mouseup',function(){ if(usingTouch) return; hold=false; });

/* ============ UI wiring ============ */
document.getElementById('dailyBtn').addEventListener('click',function(){
  ensureAC(); snd(520,0.08,'triangle');
  kind='daily'; selectMode='play';
  document.getElementById('selTitle').textContent='Escolhe o teu personagem';
  if(C.chars.length===1){ charSel='ball'; startGame(); return; }
  document.getElementById('home').classList.add('hidden');
  renderChars();
  document.getElementById('select').classList.remove('hidden');
});
document.getElementById('trainBtn').addEventListener('click',function(){
  ensureAC(); snd(480,0.08,'triangle');
  kind='train'; charSel='ball'; startGame();
});
document.getElementById('backBtn').addEventListener('click',function(){
  document.getElementById('select').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
});
document.getElementById('retryBtn').addEventListener('click',function(){
  ensureAC(); snd(520,0.08,'triangle'); startGame();
});
document.getElementById('homeBtn').addEventListener('click',function(){ goHome(); });
document.getElementById('copyBtn').addEventListener('click',function(){
  const txt=window.__share||'';
  function ok(){ toast('Copiado 😏',1700); snd(700,0.07,'triangle'); }
  function fb(){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); ok(); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(ok,fb); } else fb();
});
document.getElementById('wordOk').addEventListener('click',function(){
  const v=(document.getElementById('wordInput').value||'').trim().toUpperCase();
  document.getElementById('wordBox').classList.add('hidden');
  if(v===C.word){
    lsSet('mn_word_'+CITY,'solved');
    snd(660,0.12,'triangle',0.13); setTimeout(function(){snd(880,0.16,'triangle',0.13);},90);
    if(CITY==='original'){
      skin=5; lsSet('mn_skin',5);
      document.getElementById('avatarDot').style.background=SKINS[5].c;
      toast('✦ Certo! Skin COMETA desbloqueada',3000);
      goHome();
    } else {
      selectMode='reward';
      document.getElementById('selTitle').textContent='Certo! Escolhe o teu avatar da semana';
      renderChars();
      document.getElementById('result').classList.add('hidden');
      document.getElementById('select').classList.remove('hidden');
    }
  } else {
    lsSet('mn_word_'+CITY,'failed');
    toast('Não era isso. Agora só com o minuto completo.',3000);
    snd(200,0.2,'sawtooth',0.1);
  }
});
document.getElementById('wordSkip').addEventListener('click',function(){
  document.getElementById('wordBox').classList.add('hidden');
});
document.getElementById('avatarBtn').addEventListener('click',function(){
  const d=document.getElementById('skinDots'); let h='';
  SKINS.forEach(function(s,i){
    const un=skinUnlocked(i);
    h+='<div class="d'+(i===skin?' sel':'')+(un?'':' lock')+'" data-i="'+i+'" style="background:'+s.c+'"></div>';
  });
  d.innerHTML=h;
  Array.prototype.forEach.call(d.children,function(el){
    el.addEventListener('click',function(){
      const i=+el.dataset.i;
      if(!skinUnlocked(i)){ toast('Descobre a palavra secreta do percurso ORIGEM',2600); return; }
      skin=i; lsSet('mn_skin',i);
      document.getElementById('avatarDot').style.background=SKINS[i].c;
      Array.prototype.forEach.call(d.children,function(x){x.classList.remove('sel');});
      el.classList.add('sel'); snd(520,0.06,'triangle',0.08);
    });
  });
  document.getElementById('avatarSheet').classList.remove('hidden');
});
document.getElementById('avClose').addEventListener('click',function(){ document.getElementById('avatarSheet').classList.add('hidden'); });
document.getElementById('challBtn').addEventListener('click',function(){
  const l=document.getElementById('challList'); let h='';
  for(const id of ORDER){
    const c=CITIES[id], s=stats(id);
    const here=id===CITY;
    h+='<div class="chRow'+(here?' here':'')+'" data-go="'+(here?'':c.file)+'">'
      +'<span class="l"><span class="n">'+c.flag+' '+c.name+'</span><span class="d">'+c.desc+'</span></span>'
      +'<span class="r">'+(here?'estás aqui':(s.n?'recorde '+s.best+'%':'jogar →'))+'</span></div>';
  }
  l.innerHTML=h;
  Array.prototype.forEach.call(l.children,function(row){
    row.addEventListener('click',function(){
      const f=row.dataset.go; if(f) location.href=f;
    });
  });
  document.getElementById('challSheet').classList.remove('hidden');
});
document.getElementById('chClose').addEventListener('click',function(){ document.getElementById('challSheet').classList.add('hidden'); });

/* ============ boot ============ */
ball={y:0,vy:0,r:13}; parts=[];
goHome();
})();
</script>
