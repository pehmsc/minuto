<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MINUTO · Física v4</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --surface:#141A26; --line:#232D40;
    --text:#EDF1F8; --muted:#6E7A90; --accent:#FFC24B; --shield:#3FD9B7; --danger:#FF5C6E;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:var(--bg);color:var(--text);font-family:'Sora',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  #hud{display:flex;justify-content:space-between;align-items:center;padding-top:calc(env(safe-area-inset-top,0px) + 14px);padding-left:18px;padding-right:18px;padding-bottom:14px}
  #hud .tag{font-size:11px;letter-spacing:.22em;color:var(--muted);font-weight:600}
  #hud .right{display:flex;gap:16px;align-items:center}
  #score{font-size:15px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
  #score.lit{color:var(--accent)}
  #clock{font-size:15px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  #bar{height:5px;background:var(--line);margin:0 18px;border-radius:99px;overflow:hidden}
  #fill{height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width .12s linear}
  canvas{flex:1;display:block;width:100%;touch-action:none;-webkit-touch-callout:none}
  .screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center;z-index:10}
  .hidden{display:none}
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--muted);font-weight:600}
  h1{font-size:44px;font-weight:800;letter-spacing:-.02em}
  h1 em{font-style:normal;color:var(--accent)}
  .rule{font-size:15px;color:var(--muted);line-height:1.6;max-width:300px}
  .rule b{color:var(--text)}
  .rule .sh{color:var(--shield);font-weight:600}
  .big-btn{margin-top:8px;background:var(--accent);color:#1A1206;border:0;border-radius:16px;padding:18px 44px;font:800 17px 'Sora',sans-serif;letter-spacing:.02em}
  .big-btn:active{transform:scale(.96)}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:16px;padding:14px 30px;font:600 15px 'Sora',sans-serif}
  .pct{font-size:88px;font-weight:800;letter-spacing:-.04em;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
  .subscore{font-size:17px;font-weight:800;color:var(--muted)}
  .subscore b{color:var(--accent)}
  .blocks{font-size:22px;letter-spacing:3px}
  .verdict{font-size:16px;color:var(--muted);max-width:280px;line-height:1.5}
  #toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(140px);opacity:0;pointer-events:none;background:var(--surface);border:1px solid var(--line);color:var(--text);padding:12px 22px;border-radius:99px;font-size:14px;font-weight:600;transition:transform .25s,opacity .25s;z-index:20}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  #errbar{display:none;position:fixed;top:0;left:0;right:0;background:#FF5C6E;color:#fff;font:600 12px 'Sora',sans-serif;padding:10px 14px;z-index:99;word-break:break-all}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="tag">MINUTO · FÍSICA</span>
    <span class="right"><span id="score">0⚡</span><span id="clock">60.0</span></span>
  </div>
  <div id="bar"><div id="fill"></div></div>
  <canvas id="cv"></canvas>
</div>

<div id="errbar"></div>
<div id="start" class="screen">
  <div class="eyebrow">DESAFIO DIÁRIO · <span id="dateLbl"></span> · V4</div>
  <h1>MIN<em>U</em>TO</h1>
  <p class="rule"><b>Mantém o dedo no ecrã</b> para subir.<br>Larga para descer. Sobrevive <b>60 segundos</b>.<br>Apanha <b>⚡ orbes</b> para pontos.<br><span class="sh">Orbe verde = escudo</span> (perdoa 1 choque).</p>
  <button class="big-btn" id="playBtn">Jogar</button>
</div>

<div id="result" class="screen hidden">
  <div class="eyebrow">MINUTO · FÍSICA · <span id="dateLbl2"></span></div>
  <div class="pct" id="pctLbl">0%</div>
  <div class="subscore" id="scoreLbl"></div>
  <div class="blocks" id="blocksLbl"></div>
  <div class="verdict" id="verdictLbl"></div>
  <button class="big-btn" id="copyBtn">Copiar resultado</button>
  <button class="ghost" id="againBtn">Treinar outra vez</button>
</div>

<div id="toast">Copiado — cola no grupo 😏</div>

<script>
(function(){
"use strict";
/* ---------- on-screen error reporter (debug) ---------- */
window.addEventListener('error',function(e){
  try{
    var b=document.getElementById('errbar');
    b.textContent='ERRO: '+(e.message||'?')+' @ linha '+(e.lineno||'?');
    b.style.display='block';
  }catch(x){}
});

/* ---------- daily seed ---------- */
const now = new Date();
const dateStr = String(now.getDate()).padStart(2,'0') + '/' + String(now.getMonth()+1).padStart(2,'0');
document.getElementById('dateLbl').textContent = dateStr;
document.getElementById('dateLbl2').textContent = dateStr;
let seed = 0; const key = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
for(let i=0;i<key.length;i++){ seed = (seed*31 + key.charCodeAt(i)) >>> 0; }
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}

/* ---------- audio core ---------- */
let AC=null;
function ensureAC(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); }
function snd(f,d,type,g){ if(!AC) return; try{
  const o=AC.createOscillator(), v=AC.createGain();
  o.type=type||'sine'; o.frequency.value=f;
  v.gain.value=(g||0.12);
  o.connect(v); v.connect(AC.destination);
  o.start(); v.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+(d||0.08));
  o.stop(AC.currentTime+(d||0.08)+0.02);
}catch(e){} }

/* ---------- procedural music: BPM 100 -> 170 with progress ---------- */
const music={ on:false, next:0, beat:0, iv:null, nb:null };
function noiseBuf(){
  if(music.nb) return music.nb;
  const b=AC.createBuffer(1,Math.floor(AC.sampleRate*0.1),AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  music.nb=b; return b;
}
function kick(at){
  const o=AC.createOscillator(), g=AC.createGain();
  o.frequency.setValueAtTime(150,at); o.frequency.exponentialRampToValueAtTime(45,at+0.1);
  g.gain.setValueAtTime(0.22,at); g.gain.exponentialRampToValueAtTime(0.001,at+0.13);
  o.connect(g); g.connect(AC.destination); o.start(at); o.stop(at+0.14);
}
function hat(at,vol){
  const s=AC.createBufferSource(); s.buffer=noiseBuf();
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6500;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,at); g.gain.exponentialRampToValueAtTime(0.001,at+0.05);
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start(at); s.stop(at+0.06);
}
function bassN(at,f0,dur){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='square'; o.frequency.value=f0;
  g.gain.setValueAtTime(0.055,at); g.gain.exponentialRampToValueAtTime(0.001,at+dur);
  o.connect(g); g.connect(AC.destination); o.start(at); o.stop(at+dur+0.02);
}
function arpN(at,f0){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle'; o.frequency.value=f0;
  g.gain.setValueAtTime(0.05,at); g.gain.exponentialRampToValueAtTime(0.001,at+0.11);
  o.connect(g); g.connect(AC.destination); o.start(at); o.stop(at+0.13);
}
const BASS=[110,110,130.81,164.81,110,110,98,130.81];      /* A2 A2 C3 E3 A2 A2 G2 C3 */
const ARP=[440,523.25,659.25,783.99];                       /* A4 C5 E5 G5 */
function scheduleMusic(){
  if(!music.on || !AC) return;
  const prog=Math.min(1, t/DUR);
  const bpm=100+70*prog;
  const step=(60/bpm)/2;                                    /* 8th notes */
  while(music.next < AC.currentTime + 0.18){
    const b=music.beat, at=music.next;
    if(b%4===0) kick(at);
    if(b%2===1) hat(at, prog>0.7 ? 0.09 : 0.05);
    if(prog>0.7 && b%2===0 && b%4!==0) hat(at, 0.04);
    bassN(at, BASS[Math.floor(b/2)%8] * (prog>0.85 ? 2 : 1), step*0.9);
    if(prog>0.4 && b%2===0) arpN(at, ARP[Math.floor(b/2)%4] * (prog>0.9 ? 2 : 1));
    music.next += step; music.beat++;
  }
}
function startMusic(){
  if(!AC) return;
  music.on=true; music.next=AC.currentTime+0.06; music.beat=0;
  if(music.iv) clearInterval(music.iv);
  music.iv=setInterval(scheduleMusic,60);
}
function stopMusic(){
  music.on=false;
  if(music.iv){ clearInterval(music.iv); music.iv=null; }
}

/* ---------- canvas ---------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1,2);
  const r = cv.getBoundingClientRect();
  W=r.width; H=r.height;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

/* ---------- game state ---------- */
const DUR=60;
let rng, running=false, t=0, dist=0, ball, hold=false, walls, orbs, parts, shake=0, milestone=0, dead=false;
let score=0, shield=false, invuln=0, comboT=0, combo=0;

function reset(){
  rng = mulberry32(seed);
  t=0; dist=0; shake=0; milestone=0; dead=false;
  score=0; shield=false; invuln=0; combo=0; comboT=0;
  ball={ y:H/2, vy:0, r:13 };
  parts=[];
  walls=[];
  let x=520;
  while(x < 26000){ walls.push(makeWall(x)); x += 320 + rng()*70; }
  /* orbs: deterministic, generated after walls from the same rng stream */
  orbs=[];
  for(let i=0;i<walls.length;i++){
    const w=walls[i];
    if(rng()<0.5){                                  /* in the gap = risk/reward */
      orbs.push({x:w.x+w.w/2, y:(w.top+w.bot)/2, r:9, taken:false, sh:rng()<0.16});
    }
    if(i<walls.length-1 && rng()<0.45){             /* open stretch */
      const nx=(w.x+walls[i+1].x)/2, m=90;
      orbs.push({x:nx, y:m+rng()*(H-2*m), r:9, taken:false, sh:rng()<0.16});
    }
  }
  updateScore();
}
function makeWall(x){
  const prog = Math.min(1, x/16000);
  const gap = 250 - 105*prog;
  const m = 70;
  const c = m + gap/2 + rng() * (H - 2*m - gap);
  return { x:x, top:c-gap/2, bot:c+gap/2, w:56 };
}
function speed(){ return 235 + 215*(t/DUR); }

function boom(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=90+Math.random()*260;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+Math.random()*0.4,col:col});
  }
}
function updateScore(){
  const el=document.getElementById('score');
  el.textContent=score+'⚡';
  el.classList.toggle('lit', score>0);
}

/* ---------- loop ---------- */
let last=0;
function loop(ts){
  if(!running) return;
  if(!last) last=ts;
  let dt=Math.min((ts-last)/1000, 0.033); last=ts;

  if(!dead){
    t+=dt;
    const G=1500, TH=3300;
    ball.vy += (hold ? G-TH : G)*dt;
    ball.vy = Math.max(-560, Math.min(620, ball.vy));
    ball.y += ball.vy*dt;
    dist += speed()*dt;
    if(invuln>0) invuln-=dt;
    if(comboT>0){ comboT-=dt; if(comboT<=0) combo=0; }

    if(Math.random()<0.6) parts.push({x:96,y:ball.y,vx:-speed()*0.5,vy:(Math.random()-0.5)*40,life:0.35,col:'rgba(255,194,75,'});

    const pctM=Math.floor(t/DUR*10);
    if(pctM>milestone){ milestone=pctM; snd(420+pctM*60,0.09,'triangle',0.1); }

    const bx=96;
    /* orbs */
    for(const o of orbs){
      if(o.taken) continue;
      const ox=o.x-dist;
      if(ox>W+40) break;
      if(ox<bx-60) continue;
      const dx=ox-bx, dy=o.y-ball.y;
      if(dx*dx+dy*dy < (o.r+ball.r+5)*(o.r+ball.r+5)){
        o.taken=true;
        if(o.sh){
          if(!shield){ shield=true; snd(520,0.12,'triangle',0.13); setTimeout(function(){snd(780,0.14,'triangle',0.13);},70); }
          else { score+=25; snd(700,0.1,'triangle',0.12); }
          boom(ox,o.y,'rgba(63,217,183,',16);
        } else {
          combo++; comboT=2; score += 10 + (combo>=5?5:0);
          snd(500+Math.min(6,combo)*80,0.07,'triangle',0.12);
          boom(ox,o.y,'rgba(255,194,75,',12);
        }
        updateScore();
      }
    }

    /* collisions */
    if(ball.y-ball.r<0 || ball.y+ball.r>H){ hit(bx, Math.max(ball.r,Math.min(H-ball.r,ball.y)), true); }
    if(!dead) for(const w of walls){
      const wx=w.x-dist;
      if(wx>bx+ball.r+w.w) break;
      if(wx+w.w < bx-ball.r) continue;
      if(ball.y-ball.r < w.top || ball.y+ball.r > w.bot){
        if(bx+ball.r>wx && bx-ball.r<wx+w.w){ hit(bx,ball.y,false); break; }
      }
    }
    if(!dead && t>=DUR){ finish(1); return; }
  }

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=500*dt;
    if(p.life<=0) parts.splice(i,1);
  }
  shake=Math.max(0,shake-dt*30);

  draw();
  requestAnimationFrame(loop);
}

function hit(x,y,edge){
  if(invuln>0){
    if(edge){ ball.y=Math.max(ball.r+2,Math.min(H-ball.r-2,ball.y)); ball.vy*=-0.3; }
    return;
  }
  if(shield){
    shield=false; invuln=1.2; shake=8;
    if(edge){ ball.y=Math.max(ball.r+2,Math.min(H-ball.r-2,ball.y)); ball.vy*=-0.3; }
    boom(x,y,'rgba(63,217,183,',22);
    snd(300,0.15,'sawtooth',0.12); setTimeout(function(){snd(450,0.1,'triangle',0.1);},80);
    return;
  }
  die(x,y);
}
function die(x,y){
  dead=true; shake=14;
  stopMusic();
  boom(x,y,'rgba(255,92,110,',34);
  snd(150,0.25,'sawtooth',0.16); setTimeout(function(){snd(95,0.3,'sawtooth',0.12);},90);
  setTimeout(function(){ finish(t/DUR); }, 750);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  ctx.strokeStyle='rgba(35,45,64,0.5)'; ctx.lineWidth=1;
  const off = -(dist*0.4)%64;
  for(let x=off;x<W;x+=64){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }

  for(const w of walls){
    const wx=w.x-dist;
    if(wx>W+80) break;
    if(wx+w.w<-80) continue;
    ctx.fillStyle='#1D2637';
    ctx.strokeStyle='#31405C'; ctx.lineWidth=2;
    rr(wx,-6,w.w,w.top+6,8); rr(wx,w.bot,w.w,H-w.bot+6,8);
    ctx.fillStyle='rgba(255,194,75,0.9)';
    ctx.fillRect(wx,w.top-3,w.w,3); ctx.fillRect(wx,w.bot,w.w,3);
  }

  /* orbs */
  const pulse=1+Math.sin(t*7)*0.12;
  for(const o of orbs){
    if(o.taken) continue;
    const ox=o.x-dist;
    if(ox>W+40) break;
    if(ox<-40) continue;
    if(o.sh){
      ctx.strokeStyle='rgba(63,217,183,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ox,o.y,(o.r+5)*pulse,0,7); ctx.stroke();
      ctx.fillStyle='#3FD9B7';
      ctx.beginPath(); ctx.arc(ox,o.y,o.r*0.8*pulse,0,7); ctx.fill();
    } else {
      ctx.fillStyle='rgba(255,194,75,0.95)';
      ctx.beginPath(); ctx.arc(ox,o.y,o.r*0.75*pulse,0,7); ctx.fill();
    }
  }

  for(const p of parts){
    ctx.fillStyle = p.col + Math.max(0,p.life)*1.6 + ')';
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill();
  }

  /* ball */
  if(!dead){
    const blink = invuln>0 && Math.floor(invuln*12)%2===0;
    if(!blink){
      if(hold){
        ctx.strokeStyle='rgba(255,194,75,0.55)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(96,ball.y,ball.r+8,0,7); ctx.stroke();
      }
      if(shield){
        ctx.strokeStyle='rgba(63,217,183,0.85)'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(96,ball.y,ball.r+5,0,7); ctx.stroke();
      }
      ctx.fillStyle='#FFC24B';
      ctx.shadowColor='#FFC24B'; ctx.shadowBlur=hold?28:18;
      ctx.beginPath(); ctx.arc(96,ball.y,ball.r,0,7); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#0B0E14';
      ctx.beginPath(); ctx.arc(100,ball.y-3,4,0,7); ctx.fill();
    }
  }
  ctx.restore();

  document.getElementById('clock').textContent = Math.max(0,DUR-t).toFixed(1);
  document.getElementById('fill').style.width = Math.min(100,t/DUR*100)+'%';
}
function rr(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);} ctx.fill(); ctx.stroke(); }

/* ---------- result ---------- */
function finish(frac){
  running=false;
  stopMusic();
  const pct=Math.min(100,Math.round(frac*100));
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('scoreLbl').innerHTML='<b>'+score+'⚡</b> apanhados';
  const lbl=document.getElementById('pctLbl');
  let cur=0;
  const iv=setInterval(function(){
    cur=Math.min(pct,cur+3); lbl.textContent=cur+'%';
    if(cur>=pct){ clearInterval(iv); if(pct===100) snd(880,0.4,'triangle',0.14); }
  },18);
  const filled=Math.round(pct/10);
  document.getElementById('blocksLbl').textContent='▓'.repeat(filled)+'░'.repeat(10-filled);
  const v = pct>=100?'MINUTO COMPLETO. Lenda.':pct>=85?'Quase. QUASE. Amanhã cai.':pct>=60?'Tão perto que dói.':pct>=30?'A meio caminho do minuto.':'O minuto ganhou. Para já.';
  document.getElementById('verdictLbl').textContent=v;
  window.__share='MINUTO ⚡ Física · '+dateStr+'\n'+pct+'% '+'▓'.repeat(filled)+'░'.repeat(10-filled)+' · '+score+'⚡\nConsegues melhor?';
}

/* ---------- input (iOS-proof: touch events + mouse fallback, whole document) ---------- */
let usingTouch=false;
function press(){ if(running&&!dead){ hold=true; snd(340,0.05,'sine',0.06); } }
document.addEventListener('touchstart',function(e){
  usingTouch=true;
  if(running&&!dead){ e.preventDefault(); ensureAC(); press(); }
},{passive:false});
document.addEventListener('touchend',function(e){
  if(running&&!dead){ e.preventDefault(); }
  hold=false;
},{passive:false});
document.addEventListener('touchcancel',function(){ hold=false; });
document.addEventListener('touchmove',function(e){ if(running) e.preventDefault(); },{passive:false});
document.addEventListener('mousedown',function(){ if(usingTouch) return; if(running&&!dead){ ensureAC(); press(); } });
document.addEventListener('mouseup',function(){ if(usingTouch) return; hold=false; });

/* ---------- buttons ---------- */
document.getElementById('playBtn').addEventListener('click',function(){
  ensureAC();
  snd(520,0.08,'triangle');
  document.getElementById('start').classList.add('hidden');
  resize(); reset(); running=true; last=0;
  startMusic();
  requestAnimationFrame(loop);
});
document.getElementById('againBtn').addEventListener('click',function(){ location.reload(); });
document.getElementById('copyBtn').addEventListener('click',function(){
  const txt=window.__share||'';
  function ok(){ const tEl=document.getElementById('toast'); tEl.classList.add('show'); setTimeout(function(){tEl.classList.remove('show');},1600); snd(700,0.07,'triangle'); }
  function fallback(){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); ok(); }
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(ok,fallback); } else fallback();
});
resize();
})();
</script>
</body>
</html>
